name: agent-ci

# Run the openfde package's tests. Scoped to the agent/ package so content-only
# changes (handbook, research/) don't trigger it.
on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/agent-ci.yml"
  pull_request:
    paths:
      - "agent/**"
      - ".github/workflows/agent-ci.yml"
  workflow_dispatch: {}

permissions:
  contents: read

defaults:
  run:
    working-directory: agent

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Exercise the declared floor (3.9) and current versions.
        python-version: ["3.9", "3.11", "3.12"]
    name: pytest (py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: agent/pyproject.toml

      - name: Install openfde (with dev extras)
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Smoke-test the CLI (offline loop)
        run: openfde loop --example sales-qualification
